spring:

  # ---------------------------------------------------------------------------
  # Database
  # ---------------------------------------------------------------------------
  datasource:
    url: jdbc:postgresql://localhost:5433/los_db
    username: los_user
    password: los_password
    hikari:
      pool-name: LOS-HikariPool
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  # ---------------------------------------------------------------------------
  # JPA / Hibernate
  # ---------------------------------------------------------------------------
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

  # ---------------------------------------------------------------------------
  # Database Migrations
  # ---------------------------------------------------------------------------
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: false

# -------------------------------------------------------------------------------
# Server
# -------------------------------------------------------------------------------
server:
  port: 8080

# -------------------------------------------------------------------------------
# Spring Boot Actuator
# -------------------------------------------------------------------------------
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

# -------------------------------------------------------------------------------
# Loan Origination Service Configuration
# -------------------------------------------------------------------------------
los:
  scoring:
    weights:
      income-ratio: 30
      debt-burden: 25
      employment-stability: 20
      repayment-history: 15
      loan-purpose-risk: 10

      income-ratio-full-threshold: 0.20
      income-ratio-high-threshold: 0.10
      income-ratio-medium-threshold: 0.05

      debt-burden-low-threshold: 0.10
      debt-burden-moderate-threshold: 0.30
      debt-burden-high-threshold: 0.50
      debt-burden-severe-threshold: 0.70
