spring:
  application:
    name: fineract-loan-origination
  datasource:
    url: jdbc:postgresql://localhost:5432/fineract_los
    username: ${DB_USERNAME:fineract}
    password: ${DB_PASSWORD:fineract}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html