services:
  los-db:
    image: postgres:15
    container_name: fineract-los-db
    environment:
      POSTGRES_DB: los_db
      POSTGRES_USER: los_user
      POSTGRES_PASSWORD: los_password
    ports:
      - "5433:5432"
    volumes:
      - los-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U los_user -d los_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  los-app:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: fineract-los-app
    depends_on:
      los-db:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://los-db:5432/los_db
      SPRING_DATASOURCE_USERNAME: los_user
      SPRING_DATASOURCE_PASSWORD: los_password
      SPRING_PROFILES_ACTIVE: dev
    ports:
      - "8080:8080"

volumes:
  los-db-data: